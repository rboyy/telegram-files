services:
  telegram-files:
    container_name: telegram-files-local
    image: rboy/telegram-files:1.0
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1/api/health" ]
      interval: 10s
      retries: 3
      timeout: 10s
      start_period: 10s
    env_file:
      - .env
    environment:
      APP_ENV: "prod"
      APP_ROOT: "/app/data"
    ports:
      - "6543:80"
    volumes:
      - ./data:/app/data

